<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thinksoft</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="popup-logo">
        <span class="popup-logo-icon">T</span>
        <span class="popup-logo-text">Thinksoft</span>
      </div>
      <span class="popup-status" id="status">Active</span>
    </div>
    <p class="popup-desc" id="site-desc">Loading...</p>
    <div class="popup-stats">
      <div class="stat">
        <span class="stat-value" id="impressions">0</span>
        <span class="stat-label">Impressions</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="clicks">0</span>
        <span class="stat-label">Clicks</span>
      </div>
    </div>
    <p class="popup-footer"><a href="http://localhost:5173" target="_blank">Open Thinksoft Dashboard</a></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
